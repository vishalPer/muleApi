# in command we have run:>  treat all command one line
# run: > 
#       line 1
#       line 2
#       line 3

# for connecting multiple line we need \
# run: line 1 \  
#      line 2 \
#      line 3

# we also have | 
# run: |
#      line 1
#      line 2

# no spaces:  -Drevision = $APP_VERSION  this is wrong, -Drevision=$APP_VERSION  this is right

name: Deploy Mule App to CloudHub 2.0
 
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Anypoint environment to deploy to"
        required: true
        default: "Sandbox"
        type: choice
        options:
          - Sandbox
          - Staging
          - Production
      target:
        description: "CloudHub 2.0 deployment target (Shared Space / Private Space name)"
        required: true
        default: "Cloudhub-US-East-2"

env:
  APP_VERSION: '1.0.${{ github.run_number }}'
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'Sandbox' }}
      TARGET: ${{ github.event.inputs.target || 'Cloudhub-US-East-2' }}
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: 'maven'

      # below step will package our code and save like target/${artifactId}-${version}.jar
      - name: Build application
        run: > 
             mvn clean package -B  -ntp -DskipTests 
             -s .maven/settings.xml 
             -Drevision=$APP_VERSION
      
      # below step will rename target/${artifactId}-${version}.jar to target/app.jar
      - name: Rename package(jar) file
        run: mv "$(ls target/*.jar | head -1)" target/app.jar

      # as we know deploy maven stage will everything which comes before it like validate -> compile -> test -> package-> deploy
      # so packaging will be repeatitive task, but if we pass -Dmule.artifact=target/app.jar it will use the same jar file
      # which was created at package phase
      - name: Deploy to Exchange
        run: >
          mvn deploy -B -ntp -DskipTests
          -s .maven/settings.xml
          -Drevision=$APP_VERSION
          -Dmule.artifact=target/app.jar

      - name: Publish Build Artifacts (pom, settings, jar)
        uses: actions/upload-artifact@v4
        with:
          name: drop
          path: |
            pom.xml
            .maven/
            target/app.jar
          include-hidden-files: true   # required for .maven/
          if-no-files-found: error

  Deploy_To_Dev:
    needs: build
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/deploy-env.yml
    with:
      environment: DEV
    secrets: inherit
